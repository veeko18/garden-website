<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="header">
            <!--logo-->
            <div class="header-left">
                <a href="#" class="logo-link">
                    <img src="images/logo.png" alt="garden logo">
                </a>
                <a href="#" class="mode">
                    <img src="images/mode.png" alt="mode">
                </a>
            </div>
            <!--menu-->
            <nav class="nav">
                <button type="button" class="btn">1 day discount!</button>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link">Main Page</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">All Products</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">All sales</a>
                    </li>
                </ul>
            </nav>
            <!--wishlist & shopping bag-->
            <div class="header-actions">
                <!--ariel-label reads wishlist link, used when button has only an icon-->
                <a href="/wishlist" aria-label="Wishlist">
                    <img src="images/wishlist.png" alt="heart" />
                </a>
                <a href="shopping-bag" aria-label="Shopping cart">
                    <img src="images/shopping-bag.png" alt="shopping-bag" />
                </a>
            </div>
        </div>
        <div class="hero">
            <div class="image">
                <img src="images/02_head.png" alt="woman plants plants"/>
                <div class="hero-content">
                    <a href="#" class="hero-btn">Check out</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
